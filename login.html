<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — TOBIAS</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='32' y2='32' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%23a78bfa'/%3E%3Cstop offset='1' stop-color='%2338bdf8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='%2308080f'/%3E%3Cpath d='M16 4L25 26H20L16 15L12 26H7L16 4Z' fill='url(%23g)'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080f;--border:rgba(255,255,255,.08);--muted:rgba(255,255,255,.32);--purple:#a78bfa;--cyan:#38bdf8;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);font-family:'Inter',sans-serif;color:#fff;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-glow::before{content:'';position:absolute;top:-20%;right:-10%;width:65%;height:65%;background:radial-gradient(ellipse,rgba(56,189,248,.15) 0%,transparent 70%);animation:drift1 9s ease-in-out infinite alternate;}
.bg-glow::after{content:'';position:absolute;bottom:-20%;left:-10%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(124,58,237,.14) 0%,transparent 70%);animation:drift2 11s ease-in-out infinite alternate;}
@keyframes drift1{from{transform:translate(0,0);}to{transform:translate(-40px,25px);}}
@keyframes drift2{from{transform:translate(0,0);}to{transform:translate(30px,-20px);}}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 6vw;height:64px;border-bottom:1px solid var(--border);background:rgba(8,8,15,.8);backdrop-filter:blur(20px);}
.logo{font-size:16px;font-weight:700;letter-spacing:-.03em;color:#fff;text-decoration:none;}
.logo em{font-style:normal;background:linear-gradient(110deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-right a{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;}
.nav-right a:hover{color:#fff;}
.nav-right span{font-size:13px;color:rgba(255,255,255,.15);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px;position:relative;z-index:1;}
.card{width:100%;max-width:420px;background:rgba(255,255,255,.04);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,.1);border-top:1px solid rgba(255,255,255,.18);border-radius:24px;padding:48px 44px;box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 32px 80px rgba(0,0,0,.4);}
.card-logo{text-align:center;margin-bottom:32px;}
.card-logo a{font-size:22px;font-weight:800;letter-spacing:-.04em;text-decoration:none;}
.card-logo em{font-style:normal;background:linear-gradient(110deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.card h1{font-size:22px;font-weight:700;letter-spacing:-.03em;text-align:center;margin-bottom:6px;}
.card p.sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px;line-height:1.6;}
.social-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.social-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:10px;font:500 14px 'Inter',sans-serif;cursor:pointer;transition:all .2s;text-decoration:none;background:rgba(255,255,255,.05);border:1px solid var(--border);color:#fff;}
.social-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);}
.social-btn svg{width:18px;height:18px;flex-shrink:0;}
.or{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.or span{font-size:12px;color:rgba(255,255,255,.2);letter-spacing:.5px;}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--border);}
.form-group{margin-bottom:16px;}
.form-label{display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:500;color:rgba(255,255,255,.55);margin-bottom:6px;letter-spacing:.3px;}
.form-label a{color:rgba(167,139,250,.6);text-decoration:none;font-weight:400;}
.form-label a:hover{color:var(--purple);}
.form-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:#fff;font:400 14px 'Inter',sans-serif;outline:none;transition:border-color .2s,background .2s;}
.form-input::placeholder{color:rgba(255,255,255,.2);}
.form-input:focus{border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.05);}
.submit-btn{width:100%;padding:14px;margin-top:8px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border:none;border-radius:10px;font:600 15px 'Inter',sans-serif;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 0 30px rgba(124,58,237,.35);}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 0 50px rgba(124,58,237,.55);}
.switch{text-align:center;margin-top:28px;padding-top:24px;border-top:1px solid var(--border);font-size:13px;color:var(--muted);}
.switch a{color:var(--purple);text-decoration:none;font-weight:500;}
.switch a:hover{color:#c4b5fd;}
footer{position:relative;z-index:1;text-align:center;padding:24px;font-size:11px;color:rgba(255,255,255,.15);}
@media(max-width:500px){.card{padding:36px 24px;}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<nav>
  <a class="logo" href="index.html"><em>TOBIAS</em></a>
  <div class="nav-right">
    <a href="index.html">← Back to home</a>
    <span>|</span>
    <a href="signup.html">Sign up free</a>
  </div>
</nav>
<main>
  <div class="card">
    <div class="card-logo"><a href="index.html"><em>TOBIAS</em></a></div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your TOBIAS account to continue building.</p>

    <div class="social-btns">
      <a class="social-btn" href="#">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </a>
      <a class="social-btn" href="#">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
        Continue with GitHub
      </a>
    </div>

    <div class="or"><span>or sign in with email</span></div>

    <form onsubmit="return false;">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label class="form-label">
          Password
          <a href="#">Forgot password?</a>
        </label>
        <input class="form-input" type="password" placeholder="Your password">
      </div>
      <button class="submit-btn" type="submit" onclick="location.href='dashboard.html'">Sign in →</button>
    </form>

    <div class="switch">Don't have an account? <a href="signup.html">Sign up free</a></div>
  </div>
</main>
<footer>© 2026 TOBIAS Inc. · All rights reserved.</footer>
</body>
</html>
